<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Snake Game</h1>

    <div class="scoreboard" style="color: white; font-family: sans-serif; font-size: 20px; margin-bottom: 10px; display: flex; gap: 20px; justify-content: center;">
        <div>Score: <span id="score">0</span></div>
        <div>Level: <span id="level">1</span></div>
        <div>High Score: <span id="highScore">0</span></div>
    </div>

    <canvas id="game" width="400" height="400" style="border: 2px solid lime; display: block; margin: 0 auto;"></canvas>

    <script src="script.js"></script>
</body>
</html>
